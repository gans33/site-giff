<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1, minimum-scale=1">
<title>For You 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0a12;
    --surface: #16111f;
    --accent: #ff6eb4;
    --accent2: #c084fc;
    --text: #f0e6ff;
    --muted: #8b7aa0;
    --gold: #fbbf24;
    --pixel: "Space Mono", monospace;
    --hand: "Caveat", cursive;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--pixel);
    overflow-x: hidden;
    overflow-y: auto;
    cursor: default;
    position: fixed;
    width: 100vw;
    height: 100vh;
  }

  html {
    overflow-x: hidden;
    overflow-y: auto;
  }

  /* ── STARS BG ── */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 100%, #1a0a2e 0%, transparent 70%),
      radial-gradient(ellipse 100% 80% at 80% 80%, #0d1a2e 0%, transparent 60%),
      linear-gradient(180deg, #060410 0%, #0d0a1a 40%, #1a0d0d 100%);
  }
  .stars::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, white, transparent),
      radial-gradient(1px 1px at 25% 8%, white, transparent),
      radial-gradient(1.5px 1.5px at 40% 20%, rgba(255,200,255,0.8), transparent),
      radial-gradient(1px 1px at 55% 5%, white, transparent),
      radial-gradient(1px 1px at 70% 12%, white, transparent),
      radial-gradient(1.5px 1.5px at 85% 18%, rgba(200,200,255,0.9), transparent),
      radial-gradient(1px 1px at 92% 8%, white, transparent),
      radial-gradient(1px 1px at 15% 30%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 60% 25%, rgba(255,255,255,0.6), transparent),
      radial-gradient(2px 2px at 78% 3%, rgba(255,210,255,0.9), transparent),
      radial-gradient(1px 1px at 33% 35%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 48% 40%, rgba(255,255,255,0.3), transparent);
    animation: twinkle 4s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.7; }
    to { opacity: 1; }
  }

  /* ── PIXEL SUNSET HORIZON ── */
  .horizon {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 45%;
    pointer-events: none; z-index: 0;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(120,50,20,0.15) 30%,
      rgba(180,80,20,0.25) 55%,
      rgba(100,40,10,0.5) 75%,
      rgba(20,10,5,0.9) 100%
    );
  }

  /* ── OCEAN PIXEL LINES ── */
  .ocean {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 22%;
    pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .wave {
    position: absolute;
    left: -10%; width: 120%;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(255,140,80,0.4), rgba(255,180,100,0.6), rgba(255,140,80,0.4), transparent);
    animation: waveMove 3s linear infinite;
  }
  .wave:nth-child(1) { bottom: 60%; animation-delay: 0s; opacity: 0.6; }
  .wave:nth-child(2) { bottom: 50%; animation-delay: 0.8s; opacity: 0.4; height: 2px; }
  .wave:nth-child(3) { bottom: 40%; animation-delay: 1.6s; opacity: 0.3; }
  .wave:nth-child(4) { bottom: 28%; animation-delay: 0.4s; opacity: 0.5; height: 2px; }
  .wave:nth-child(5) { bottom: 15%; animation-delay: 1.2s; opacity: 0.2; }
  @keyframes waveMove {
    0% { transform: translateX(0); }
    100% { transform: translateX(-5%); }
  }

  /* ── MAIN SCENE ── */
  #scene {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-bottom: 120px;
  }

  /* ── CHARACTER WRAPPER ── */
  #char-wrap {
    position: relative;
    cursor: pointer;
    transition: transform 0.2s;
    user-select: none;
    background: transparent;
    border: none;
    padding: 0;
  }
  #char-wrap:hover { transform: scale(1.03); }
  #char-wrap:active { transform: scale(0.97); }
  #char-wrap:focus { outline: none; }

  /* pixel character canvas */
  #pixel-char {
    display: block;
    background: transparent;
    image-rendering: pixelated;
    width: 300px;
    height: 390px;
    filter: drop-shadow(0 0 30px rgba(255,110,180,0.35)) drop-shadow(0 0 60px rgba(192,132,252,0.2));
    transition: filter 0.3s;
  }
  #char-wrap:hover #pixel-char {
    filter: drop-shadow(0 0 40px rgba(255,110,180,0.6)) drop-shadow(0 0 80px rgba(192,132,252,0.4));
  }

  /* ── HOVER HINT ── */
  .hint {
    font-family: var(--pixel);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 12px;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* ── DEMO LABEL ── */
  .demo-label {
    position: absolute;
    left: 50%;
    bottom: -70px;
    transform: translateX(-50%);
    font-family: var(--pixel);
    font-size: 14px;
    color: rgba(240,230,255,0.8);
    letter-spacing: 1px;
    white-space: nowrap;
    text-shadow: 1px 1px 0 #000;
    text-align: center;
    line-height: 1.3;
  }

  /* ── ALBUM OVERLAY ── */
  #album-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 110;
    background: rgba(6,3,15,0.98);
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s ease;
  }
  #album-overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .album-grid {
    display: flex;
    gap: 28px;
    align-items: center;
    padding: 20px;
  }

  /* ── POLAROID CARD ── */
  .polaroid {
    background: #1a1220;
    border: 1px solid rgba(255,110,180,0.2);
    padding: 12px 12px 36px;
    cursor: pointer;
    transform: rotate(var(--rot));
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s, border-color 0.25s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    position: relative;
    animation: slideUp 0.4s ease forwards;
    opacity: 0;
  }
  .polaroid:nth-child(1) { --rot: -4deg; animation-delay: 0.05s; }
  .polaroid:nth-child(2) { --rot: 1.5deg; animation-delay: 0.15s; }
  .polaroid:nth-child(3) { --rot: -2deg; animation-delay: 0.25s; }

  @keyframes slideUp {
    from { opacity: 0; transform: rotate(var(--rot)) translateY(40px); }
    to { opacity: 1; transform: rotate(var(--rot)) translateY(0); }
  }

  .polaroid:hover {
    transform: rotate(0deg) scale(1.06) translateY(-8px);
    box-shadow: 0 20px 60px rgba(255,110,180,0.25), 0 0 0 1px rgba(255,110,180,0.3);
    border-color: rgba(255,110,180,0.5);
    z-index: 5;
  }

  .polaroid img {
    width: 220px;
    height: 260px;
    object-fit: cover;
    display: block;
    image-rendering: auto;
  }

  .polaroid .caption {
    position: absolute;
    bottom: 8px; left: 0; right: 0;
    text-align: center;
    font-family: var(--hand);
    font-size: 15px;
    font-weight: 600;
    color: rgba(240,230,255,0.8);
    letter-spacing: 0.5px;
  }

  .polaroid .num-badge {
    position: absolute;
    top: -10px; right: -10px;
    background: var(--accent);
    color: #000;
    font-family: var(--pixel);
    font-size: 9px;
    font-weight: 700;
    padding: 3px 7px;
    letter-spacing: 1px;
  }

  /* close btn */
  .close-btn {
    position: fixed;
    top: 24px; right: 32px;
    background: none;
    border: 1px solid rgba(255,110,180,0.4);
    color: rgba(255,110,180,0.8);
    font-family: var(--pixel);
    font-size: 11px;
    padding: 8px 16px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .close-btn:hover {
    background: rgba(255,110,180,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── PHOTO VIEW ── */
  #photo-view {
    display: none;
    position: fixed; inset: 0; z-index: 120;
    background: rgba(6,3,15,0.98);
    backdrop-filter: blur(10px);
    align-items: center;
    justify-content: center;
    gap: 60px;
    padding: 40px;
    animation: fadeIn 0.3s ease;
  }
  #photo-view.show { display: flex; }

  .photo-main {
    position: relative;
    flex-shrink: 0;
  }
  .photo-main img {
    width: 480px;
    max-height: 75vh;
    object-fit: cover;
    display: block;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 30px 80px rgba(0,0,0,0.8);
  }
  .photo-main .photo-num {
    position: absolute;
    bottom: -28px; left: 50%;
    transform: translateX(-50%);
    font-family: var(--hand);
    font-size: 20px;
    color: rgba(240,230,255,0.7);
    white-space: nowrap;
  }

  .photo-info {
    max-width: 300px;
  }
  .back-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(240,230,255,0.6);
    font-family: var(--pixel);
    font-size: 10px;
    padding: 8px 16px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
    margin-bottom: 28px;
    display: block;
  }
  .back-btn:hover {
    border-color: rgba(255,255,255,0.5);
    color: var(--text);
  }
  .photo-desc {
    font-family: var(--hand);
    font-size: 22px;
    line-height: 1.6;
    color: rgba(240,230,255,0.85);
    font-weight: 400;
  }
  .photo-tag {
    display: inline-block;
    margin-top: 20px;
    font-family: var(--pixel);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--accent);
    border: 1px solid rgba(255,110,180,0.3);
    padding: 4px 10px;
    text-transform: uppercase;
  }

  /* ── TITLE TOP ── */
  .site-title {
    position: fixed;
    top: 28px; left: 50%;
    transform: translateX(-50%);
    font-family: var(--hand);
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(240,230,255,0.35);
    text-transform: uppercase;
    z-index: 2;
    white-space: nowrap;
  }

  /* SCANLINE overlay */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 100;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
  }

  /* ── MOBILE RESPONSIVE (≤ 639px) ── */
  @media (max-width: 639px) {
    .site-title {
      top: 16px;
      font-size: 11px;
      letter-spacing: 2px;
    }

    #scene {
      flex-direction: column;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      padding-bottom: 140px;
    }

    #char-wrap {
      width: 210px !important;
      height: 276px !important;
    }

    #pixel-char {
      width: 210px !important;
      height: 276px !important;
    }

    .demo-label {
      left: 50%;
      bottom: -55px;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 0.5px;
    }

    .hint {
      font-size: 12px;
      letter-spacing: 1px;
    }

    /* Album Grid Mobile */
    #album-overlay {
      padding: 20px;
      justify-content: flex-start;
      align-items: flex-start;
      overflow-y: auto;
    }

    .album-grid {
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 100%;
      padding: 60px 20px 40px;
      align-items: center;
    }

    .polaroid {
      transform: rotate(var(--rot)) !important;
      transition: transform 0.25s ease, box-shadow 0.25s;
    }

    .polaroid:nth-child(1),
    .polaroid:nth-child(2),
    .polaroid:nth-child(3) {
      animation: none !important;
      opacity: 1 !important;
    }

    .polaroid img {
      width: 180px;
      height: 220px;
      object-fit: cover;
    }

    .polaroid:hover {
      transform: rotate(0deg) scale(1.05) !important;
      box-shadow: 0 12px 40px rgba(255,110,180,0.2);
    }

    .polaroid .caption {
      font-size: 13px;
      bottom: 6px;
    }

    .close-btn {
      top: 16px;
      right: 16px;
      font-size: 10px;
      padding: 6px 12px;
    }

    /* Photo View Mobile */
    #photo-view {
      flex-direction: column;
      gap: 20px;
      padding: 20px;
      justify-content: flex-start;
      align-items: stretch;
      overflow-y: auto;
    }

    .photo-main {
      width: 100%;
      margin-top: 50px;
    }

    .photo-main img {
      width: 100%;
      max-width: 100%;
      height: auto;
      max-height: none;
    }

    .photo-main .photo-num {
      position: relative;
      bottom: auto;
      left: auto;
      transform: none;
      font-size: 16px;
      margin-top: 12px;
      text-align: center;
    }

    .photo-info {
      max-width: 100%;
      width: 100%;
    }

    .back-btn {
      font-size: 10px;
      padding: 6px 12px;
      margin-bottom: 16px;
      width: auto;
    }

    .photo-desc {
      font-size: 16px;
      line-height: 1.5;
    }

    .photo-tag {
      font-size: 8px;
      padding: 3px 8px;
      margin-top: 12px;
    }
  }
</style>
</head>
<body>

<div class="stars"></div>
<div class="horizon"></div>
<div class="ocean">
  <div class="wave"></div><div class="wave"></div><div class="wave"></div>
  <div class="wave"></div><div class="wave"></div>
</div>

<div class="site-title">✦ Virtual Gift Song ✦</div>

<!-- MAIN SCENE -->
<div id="scene">
  <button id="char-wrap" type="button" onclick="openAlbums()">
    <img id="pixel-char" src="karakter_nikz.png" alt="Pixel Character">
    <div class="demo-label">One Last Goodbye<br>Before We Chase<br>Our Own Stories.</div>
  </button>
</div>
  
<!-- ALBUM OVERLAY -->
<div id="album-overlay">
  <button class="close-btn" type="button" onclick="closeAlbums()">✕ tutup</button>
  <div class="album-grid">
    <div class="polaroid" onclick="openPhoto(0)">
      <div class="num-badge">Manis</div>
      <img src="foto_nikz1.jpeg" alt="Momen 1">
      <div class="caption">Momen 1</div>
    </div>
    <div class="polaroid" onclick="openPhoto(1)">
      <div class="num-badge">Manis</div>
      <img src="foto_nikz2.jpeg" alt="Momen 2">
      <div class="caption">Momen 2</div>
    </div>
    <div class="polaroid" onclick="openPhoto(2)">
      <div class="num-badge">Manis</div>
      <img src="foto_nikz3.png" alt="Momen 3">
      <div class="caption">Momen 3</div>
    </div>
  </div>
</div>

<!-- PHOTO VIEW -->
<div id="photo-view">
  <div class="photo-main">
    <img id="pv-img" src="" alt="">
    <div class="photo-num" id="pv-num"></div>
  </div>
  <div class="photo-info">
    <button class="back-btn" onclick="backToAlbums()">← Kembali</button>
    <div class="photo-desc" id="pv-desc"></div>
    <div class="photo-tag" id="pv-tag"></div>
  </div>
</div>

<script>
// ── PHOTOS DATA ──
const photos = [
  {
    src: 'foto_nikz1.jpeg',
    num: 'Momen 1',
    desc: '“Terima kasih sudah jadi guru sekaligus ibu kedua buat kami. Terima kasih sudah sabar menghadapi semua tingkah kami setiap hari. Kami pasti kangen.”.',
    tag: 'Paket Manis • Foto 1 / 3'
  },
  {
    src: 'foto_nikz2.jpeg',
    num: 'Momen 2',
    desc: 'Foto kedua dari paket Manis.',
    tag: 'Paket Manis • Foto 2 / 3'
  },
  {
    src: 'foto_nikz3.png',
    num: 'Momen 3',
    desc: 'Foto ketiga dari paket Manis.',
    tag: 'Paket Manis • Foto 3 / 3'
  }
];

function openAlbums() {
  document.getElementById('album-overlay').classList.add('show');
}
function closeAlbums() {
  document.getElementById('album-overlay').classList.remove('show');
  document.getElementById('photo-view').classList.remove('show');
  if (location.hash === '#album-overlay') {
    history.replaceState(null, '', location.pathname + location.search);
  }
}
function openPhoto(i) {
  const p = photos[i];
  document.getElementById('pv-img').src = p.src;
  document.getElementById('pv-num').textContent = p.num;
  document.getElementById('pv-desc').textContent = p.desc;
  document.getElementById('pv-tag').textContent = p.tag;
  document.getElementById('photo-view').classList.add('show');
  document.getElementById('album-overlay').classList.remove('show');
  if (location.hash === '#album-overlay') {
    history.replaceState(null, '', location.pathname + location.search);
  }
}
function backToAlbums() {
  document.getElementById('photo-view').classList.remove('show');
  document.getElementById('album-overlay').classList.add('show');
}

// ESC to close
document.addEventListener('keydown', e => {
  if(e.key==='Escape') {
    document.getElementById('photo-view').classList.remove('show');
    document.getElementById('album-overlay').classList.remove('show');
  }
});

// ── MOBILE TOUCH ENHANCEMENTS ──
if (window.innerWidth <= 639) {
  const imgEl = document.getElementById('pixel-char');
  const wrap = document.getElementById('char-wrap');
  
  // Touch glow effect
  wrap.addEventListener('touchstart', () => {
    imgEl.style.filter = 'drop-shadow(0 0 40px rgba(255,110,180,0.6))';
  }, {passive: true});
  
  wrap.addEventListener('touchend', () => {
    imgEl.style.filter = 'drop-shadow(0 0 30px rgba(255,110,180,0.35))';
  }, {passive: true});
  
  // Smooth scroll on mobile
  document.querySelector('.album-grid').style.scrollBehavior = 'smooth';
  document.getElementById('album-overlay').style.scrollBehavior = 'smooth';
}
</script>
</body>
</html>
